# 라벨 정의 / Label definitions
# 
# 적용 방법 / How to apply:
#   1. gh CLI 설치 후 / After installing gh CLI:
#      gh label create --file .github/labels.yml
#   2. 또는 아래 명령어 스크립트를 참고: docs/setup-labels.sh
#   3. 또는 GitHub 웹 UI에서 수동 생성 (Issues → Labels)

